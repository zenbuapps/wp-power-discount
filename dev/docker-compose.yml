name: power-discount-dev

services:
  db:
    image: mysql:8.0
    container_name: power-discount-dev-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wp
      MYSQL_PASSWORD: wppass
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 20

  wp:
    image: wordpress:latest
    container_name: power-discount-dev-wp
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3303:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wppass
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: 1
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
        define('SCRIPT_DEBUG', true);
    volumes:
      - wp_data:/var/www/html
      - /Users/luke/power-discount:/var/www/html/wp-content/plugins/power-discount

  cli:
    image: wordpress:cli-php8.2
    container_name: power-discount-dev-cli
    depends_on:
      wp:
        condition: service_started
    user: "33:33"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wppass
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wp_data:/var/www/html
      - /Users/luke/power-discount:/var/www/html/wp-content/plugins/power-discount
    entrypoint: ["sh", "-c", "sleep infinity"]

volumes:
  db_data:
  wp_data:
